name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/DiscordStatusUpdater/DiscordStatusUpdater.csproj

      - name: Build
        run: dotnet build src/DiscordStatusUpdater/DiscordStatusUpdater.csproj --no-restore -c Release

      - name: Publish
        run: |
          dotnet publish src/DiscordStatusUpdater/DiscordStatusUpdater.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordStatusUpdater-win-x64
          path: ./publish/DiscordStatusUpdater.exe
